<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font-family: sans-serif; margin: 12px; width: 360px; }
      input { width: 100%; padding: 8px; margin: 8px 0; box-sizing: border-box; }
      button { padding: 8px 10px; width: 100%; cursor: pointer; }
      .hint { font-size: 12px; color: #444; margin-top: 6px; }
      .status { margin-top: 10px; font-size: 12px; }
      code { font-size: 12px; }
    </style>
  </head>
  <body>
    <div><b>Handoff token / session_id</b></div>
    <input id="token" placeholder="Paste session_id (e.g. PfidcY0cNI2b...)" />
    <button id="go">Connect</button>

    <div class="hint">
      Backend base: <code id="base"></code><br/>
      You can paste either a full handoff URL or just the token.
    </div>

    <div class="status" id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
